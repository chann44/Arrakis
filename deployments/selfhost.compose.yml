services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_dynamic:/etc/traefik/dynamic
    networks:
      - tge_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
      POSTGRES_DB: ${DB_NAME:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev} -d ${DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  migrate:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: "no"
    env_file:
      - ../.env
    command:
      - /bin/sh
      - -c
      - /usr/local/bin/goose -dir /app/sql/migrations postgres "postgres://$$DB_USER:$$DB_PASSWORD@postgres:5432/$$DB_NAME?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tge_net

  api:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      DOMAIN_ROUTER_SYNC_ENABLED: "true"
      TRAEFIK_DYNAMIC_CONFIG_PATH: /etc/traefik/dynamic/custom-domains.yml
      DOCKER_LOGS_ENABLED: "true"
      DOCKER_LOGS_SOCKET_PATH: /var/run/docker.sock
      DOCKER_LOGS_INCLUDE_ALL: "false"
      DOCKER_LOGS_NETWORK: tge_net
    command: ["/usr/local/bin/api"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    labels:
      - traefik.enable=true
      - traefik.http.routers.tge-api-setup.rule=PathPrefix(`/api`)
      - traefik.http.routers.tge-api-setup.entrypoints=web
      - traefik.http.routers.tge-api-setup.priority=100
      - traefik.http.middlewares.tge-api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.tge-api-setup.middlewares=tge-api-strip
      - traefik.http.services.tge-api-setup.loadbalancer.server.port=8080
    volumes:
      - traefik_dynamic:/etc/traefik/dynamic
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tge_net

  worker:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      AI_ANALYZER_MODE: http
      AI_ANALYZER_URL: http://ai-analyzer:8090
    command: ["/usr/local/bin/worker"]
    depends_on:
      api:
        condition: service_healthy
      ai-analyzer:
        condition: service_started
    networks:
      - tge_net

  ai-analyzer:
    image: ${TGE_AI_ANALYZER_IMAGE:-arrakis-ai-analyzer:local}
    build:
      context: ../apps/ai-analyzer
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: "8090"
      REDIS_URL: redis://redis:6379
      AI_ANALYZER_DATABASE_URL: postgres://${DB_USER:-dev}:${DB_PASSWORD:-dev}@postgres:5432/${DB_NAME:-app}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_net

  scheduler:
    image: ${TGE_BACKEND_IMAGE:-chann44/tge-backend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
    command: ["/usr/local/bin/scheduler"]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tge_net

  web:
    image: ${TGE_WEB_IMAGE:-chann44/tge-web:latest}
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.tge-web-setup.rule=PathPrefix(`/`)
      - traefik.http.routers.tge-web-setup.entrypoints=web
      - traefik.http.routers.tge-web-setup.priority=10
      - traefik.http.services.tge-web-setup.loadbalancer.server.port=3000
    networks:
      - tge_net

volumes:
  traefik_letsencrypt:
  traefik_dynamic:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  tge_net:
    name: tge_net
    driver: bridge
