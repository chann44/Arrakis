services:
  # Dev infra stack only (api/worker/scheduler run locally via make targets).
  # To enable System Health Docker logs locally, set DOCKER_LOGS_* in .env
  # and run the API on host (it reads /var/run/docker.sock directly).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tge_dev_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tge_dev_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_dev_net

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  tge_dev_net:
    name: tge_dev_net
    driver: bridge
