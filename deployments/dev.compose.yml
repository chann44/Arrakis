services:
  # Dev infra stack only (api/worker/scheduler run locally via make targets).
  # To enable System Health Docker logs locally, set DOCKER_LOGS_* in .env
  # and run the API on host (it reads /var/run/docker.sock directly).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tge_dev_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tge_dev_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_dev_net

  ai-analyzer:
    image: ${TGE_AI_ANALYZER_IMAGE:-arrakis-ai-analyzer:local}
    build:
      context: ../apps/ai-analyzer
      dockerfile: Dockerfile
    environment:
      PORT: "8090"
      REDIS_URL: redis://redis:6379
      AI_ANALYZER_DATABASE_URL: postgres://${DB_USER:-dev}:${DB_PASSWORD:-dev}@postgres:5432/${DB_NAME:-app}?sslmode=disable
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-arrakis}
      AI_ANALYZER_MODEL: ${AI_ANALYZER_MODEL:-gpt-4.1-mini}
      AI_ANALYZER_TOKEN: ${AI_ANALYZER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tge_dev_net

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  tge_dev_net:
    name: tge_dev_net
    driver: bridge
